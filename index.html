    <style>
      body { font-family: 'Inter', sans-serif; }

      /* Scroll-up animation */
      .animate-on-scroll {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .animate-on-scroll.animate-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .animate-on-scroll:nth-child(2) { transition-delay: 0.07s; }
      .animate-on-scroll:nth-child(3) { transition-delay: 0.14s; }
      .animate-on-scroll:nth-child(4) { transition-delay: 0.21s; }

      /* Directional animations */
      .animate-from-left {
        opacity: 0;
        transform: translateX(-24px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .animate-from-right {
        opacity: 0;
        transform: translateX(24px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .animate-from-left.animate-visible,
      .animate-from-right.animate-visible {
        opacity: 1;
        transform: translateX(0);
      }

      /* Services stagger */
      .services-grid > *:nth-child(1) { transition-delay: 0s; }
      .services-grid > *:nth-child(2) { transition-delay: 0.1s; }
      .services-grid > *:nth-child(3) { transition-delay: 0.2s; }
      .services-grid > *:nth-child(4) { transition-delay: 0.3s; }
    </style>
